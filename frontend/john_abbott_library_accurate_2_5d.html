
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{padding:0.75rem 0}
.tabs{display:flex;gap:6px;margin-bottom:0.75rem}
.tab{font-size:12px;padding:5px 16px;border-radius:20px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.12s}
.tab.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:0.6rem}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.info{background:var(--color-background-secondary);border-radius:10px;padding:10px 14px;margin-top:0.6rem;min-height:48px}
.iN{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:1px}
.iD{font-size:11px;color:var(--color-text-secondary)}
</style>

<div id="app">
<h2 style="position:absolute;width:1px;height:1px;overflow:hidden">John Abbott College Library — 2.5D floor plan</h2>
<div class="tabs">
  <button class="tab on" onclick="go('f1')" id="tf1">1st floor</button>
  <button class="tab" onclick="go('bs')" id="tbs">Basement</button>
</div>
<div class="legend">
  <div class="li"><div class="ld" style="background:#cfe0f0"></div>Study rooms</div>
  <div class="li"><div class="ld" style="background:#cde8d4"></div>Open library</div>
  <div class="li"><div class="ld" style="background:#efe5c8"></div>Service / desk</div>
  <div class="li"><div class="ld" style="background:#e2dbd3"></div>Corridor / utility</div>
  <div class="li"><div class="ld" style="background:#f7d6d6"></div>Exit / stairwell</div>
  <div class="li"><div class="ld" style="background:#d8eeda"></div>Evacuation route</div>
</div>
<svg id="sv" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block"></svg>
<div class="info"><div class="iN" id="iN">Click a room to see details</div><div class="iD" id="iD">John Abbott College Library — 2.5D isometric view</div></div>
</div>

<script>
const WH=22;

function iso(x,y){
  return {
    x: (x - y) * 0.75,
    y: (x + y) * 0.38
  };
}

function pt(x,y,z=0){
  const p=iso(x,y);
  return (p.x)+','+(p.y - z);
}

function topPoly(x1,y1,x2,y2,z){
  return [pt(x1,y1,z),pt(x2,y1,z),pt(x2,y2,z),pt(x1,y2,z)].join(' ');
}
function leftPoly(x1,y1,x2,y2){
  return [pt(x1,y2,0),pt(x1,y2,WH),pt(x1,y1,WH),pt(x1,y1,0)].join(' ');
}
function rightPoly(x1,y1,x2,y2){
  return [pt(x2,y1,0),pt(x2,y1,WH),pt(x2,y2,WH),pt(x2,y2,0)].join(' ');
}
function frontPoly(x1,y1,x2,y2){
  return [pt(x1,y2,0),pt(x1,y2,WH),pt(x2,y2,WH),pt(x2,y2,0)].join(' ');
}

const COLORS={

  exit:   {top:'#f7d6d6', left:'#b85050', right:'#cc7070'},
  evac:   {top:'#d8eeda', left:'#4a9a5a', right:'#68b878'},
};

const FLOORS={

    {id:'104',  label:'104',  type:'service',note:'Room 104 — central service / help desk area',     x:330, y:80,  w:90,  h:80},
    {id:'105',  label:'105',  type:'hall',   note:'Room 105 — stairwell near Exit 3',                x:220, y:380, w:80,  h:60},

    {id:'110',  label:'110',  type:'hall',   note:'Room 110 — corridor linking to east wing',        x:420, y:80,  w:80,  h:80},
    {id:'111',  label:'111',  type:'exit',   note:'Room 111 — elevator lobby (DO NOT USE in fire)',  x:420, y:200, w:80,  h:80},
    {id:'112',  label:'112',  type:'study',  note:'Room 112 — study room east wing',                x:500, y:0,   w:80,  h:80},
    {id:'113',  label:'113',  type:'exit',   note:'Room 113 — fire hose / pull station area',        x:300, y:300, w:60,  h:80},
    {id:'114',  label:'114',  type:'study',  note:'Room 114 — study room east wing',                x:580, y:0,   w:80,  h:80},
    {id:'115',  label:'115',  type:'hall',   note:'Room 115 — washrooms / corridor',                 x:420, y:280, w:80,  h:80},
    {id:'116',  label:'116',  type:'study',  note:'Room 116 — study room far east',                 x:660, y:0,   w:100, h:80},
    {id:'117',  label:'117',  type:'hall',   note:'Room 117 — storage / utility',                   x:420, y:360, w:60,  h:60},
    {id:'118',  label:'118',  type:'study',  note:'Room 118 — study room east lower',               x:660, y:80,  w:100, h:80},
    {id:'119',  label:'119',  type:'open',   note:'Room 119 — large open east area',                x:500, y:160, w:260, h:180},

  ]
}
};

let cur='f1';

function go(f){
  cur=f;
  document.getElementById('tf1').classList.toggle('on',f==='f1');
  document.getElementById('tbs').classList.toggle('on',f==='bs');
  document.getElementById('iN').textContent='Click a room to see details';
  document.getElementById('iD').textContent='John Abbott College Library — 2.5D isometric view';
  draw();
}

function shade(hex, amt){
  let r=parseInt(hex.slice(1,3),16)+amt;
  let g=parseInt(hex.slice(3,5),16)+amt;
  let b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r));
  g=Math.max(0,Math.min(255,g));
  b=Math.max(0,Math.min(255,b));
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}

function draw(){
  const fl=FLOORS[cur];
  const sv=document.getElementById('sv');
  sv.setAttribute('viewBox', fl.vb);
  sv.innerHTML='';

  const OX=fl.ox, OY=fl.oy;

  function tpt(x,y,z=0){
    const p=iso(x,y);
    return (p.x+OX)+','+(p.y+OY-z);
  }
  function tpoly(x1,y1,x2,y2,z){
    return [tpt(x1,y1,z),tpt(x2,y1,z),tpt(x2,y2,z),tpt(x1,y2,z)].join(' ');
  }

  const sorted=[...fl.rooms].sort((a,b)=>(a.x+a.y)-(b.x+b.y));

  sorted.forEach(r=>{
    const c=COLORS[r.type];
    const x1=r.x,y1=r.y,x2=r.x+r.w,y2=r.y+r.h;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';

    const mkPoly=(pts,fill,stroke='#fff',sw=1)=>{
      const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      p.setAttribute('points',pts);
      p.setAttribute('fill',fill);
      p.setAttribute('stroke',stroke);
      p.setAttribute('stroke-width',sw);
      return p;
    };

    const leftF = mkPoly([tpt(x1,y1,0),tpt(x1,y1,WH),tpt(x1,y2,WH),tpt(x1,y2,0)].join(' '), c.left);
    const rightF= mkPoly([tpt(x2,y1,0),tpt(x2,y1,WH),tpt(x2,y2,WH),tpt(x2,y2,0)].join(' '), c.right);
    const topF  = mkPoly(tpoly(x1,y1,x2,y2,WH), c.top, '#fff', 1.5);

    g.appendChild(leftF);
    g.appendChild(rightF);
    g.appendChild(topF);

    const cx_iso = iso((x1+x2)/2,(y1+y2)/2);
    const tx=cx_iso.x+OX, ty=cx_iso.y+OY-WH-5;

    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',tx); lbl.setAttribute('y',ty);
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('font-size', r.w>=80?'8.5':'7');
    lbl.setAttribute('font-weight','500');
    lbl.setAttribute('fill','var(--color-text-primary)');
    lbl.setAttribute('pointer-events','none');
    lbl.textContent=r.id;
    g.appendChild(lbl);

    g.addEventListener('mouseenter',()=>topF.setAttribute('fill',shade(c.top,18)));
    g.addEventListener('mouseleave',()=>topF.setAttribute('fill',c.top));
    g.addEventListener('click',()=>{
      document.getElementById('iN').textContent=r.label;
      document.getElementById('iD').textContent=r.note;
    });
    sv.appendChild(g);
  });

  fl.exits.forEach(e=>{
    const p=iso(e.x,e.y);
    const ex=p.x+OX, ey=p.y+OY;
    const pill=document.createElementNS('http://www.w3.org/2000/svg','rect');
    pill.setAttribute('x',ex-18); pill.setAttribute('y',ey-9);
    pill.setAttribute('width','36'); pill.setAttribute('height','16');
    pill.setAttribute('rx','8'); pill.setAttribute('fill','#2a7a3b');
    sv.appendChild(pill);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',ex); t.setAttribute('y',ey+1);
    t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-size','7'); t.setAttribute('font-weight','500');
    t.setAttribute('fill','#ffffff'); t.setAttribute('pointer-events','none');
    t.textContent=e.label;
    sv.appendChild(t);
  });
}

draw();
</script>
