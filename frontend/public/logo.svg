<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 174 48" shape-rendering="geometricPrecision">
  <style>
    .eye { fill: #fff }
    .pup { fill: #000 }
    .hi  { fill: #fff }
    .txt { fill: #fff }
    @media (prefers-color-scheme: light) {
      .eye { fill: #000 }
      .pup { fill: #fff }
      .hi  { fill: #000; opacity: .12 }
      .txt { fill: #000 }
    }
  </style>

  <!-- Left eye -->
  <path d="M2,24 C2,17 24,17 24,24 C24,30 2,30 2,24 Z" class="eye"/>
  <circle cx="13" cy="24" r="4.8" class="pup"/>
  <circle cx="14.8" cy="21.8" r="1.4" class="hi"/>

  <!-- Right eye -->
  <path d="M28,24 C28,17 50,17 50,24 C50,30 28,30 28,24 Z" class="eye"/>
  <circle cx="39" cy="24" r="4.8" class="pup"/>
  <circle cx="40.8" cy="21.8" r="1.4" class="hi"/>

  <!-- Wordmark -->
  <text
    x="62" y="32"
    font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="500"
    letter-spacing="-0.6"
    class="txt"
  >foco</text>
</svg>
