<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="geometricPrecision">

  <rect width="1200" height="630" fill="#000"/>

  <!-- Subtle grid -->
  <g stroke="#fff" stroke-width=".5" opacity=".04">
    <line x1="0"    y1="105" x2="1200" y2="105"/>
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="315" x2="1200" y2="315"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="0"    y1="525" x2="1200" y2="525"/>
    <line x1="150"  y1="0"   x2="150"  y2="630"/>
    <line x1="300"  y1="0"   x2="300"  y2="630"/>
    <line x1="450"  y1="0"   x2="450"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="750"  y1="0"   x2="750"  y2="630"/>
    <line x1="900"  y1="0"   x2="900"  y2="630"/>
    <line x1="1050" y1="0"   x2="1050" y2="630"/>
  </g>

  <!-- ── EYES — centered left, large ── -->
  <!-- Left eye -->
  <path d="M90,315 C90,270 250,270 250,315 C250,355 90,355 90,315 Z" fill="#fff"/>
  <circle cx="170" cy="315" r="30" fill="#000"/>
  <circle cx="182" cy="300" r="9"  fill="#fff"/>

  <!-- Right eye -->
  <path d="M270,315 C270,270 430,270 430,315 C430,355 270,355 270,315 Z" fill="#fff"/>
  <circle cx="350" cy="315" r="30" fill="#000"/>
  <circle cx="362" cy="300" r="9"  fill="#fff"/>

  <!-- ── WORDMARK ── -->
  <text
    x="480" y="360"
    font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="128"
    font-weight="500"
    letter-spacing="-4"
    fill="#fff"
  >foco</text>

  <!-- Rule -->
  <line x1="480" y1="388" x2="920" y2="388" stroke="#fff" stroke-width="1" opacity=".15"/>

  <!-- Tagline -->
  <text
    x="482" y="422"
    font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="19"
    font-weight="400"
    letter-spacing="3.5"
    fill="#fff"
    opacity=".40"
  >NOT HEADCOUNTS — BEHAVIOUR</text>
</svg>
